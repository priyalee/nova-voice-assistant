<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Voice Assistant</title>

<link rel="icon" href="logo.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="voice.css">

</head>


<body>

<!-- Startup Cover -->
<div class="cover" id="cover">
    <img src="logo.png">
</div>

<!-- Main Assistant UI -->
<div class="assistant-container" id="assistantUI">

<header class="top-bar">
    <div class="logo">
        <img src="logo.png" alt="Nova">
        <span>Nova Assistant</span>
    </div>
</header>

<div class="assistant-main">

    <div class="assistant-left">

        <div class="mic-container">
            <button id="startBtn" class="mic-btn">
                <i class="fa-solid fa-microphone"></i>
            </button>

            <div class="wave-container" id="waveAnimation">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="speech-box">
            <h3><i class="fa-solid fa-comment"></i> You Said</h3>
            <p id="speechText">Press the mic and start speaking...</p>
        </div>

<!-- Application -->
<div class="app" id="app">

<header class="header">

<h1>
<i class="fa-solid fa-robot"></i>
Nova Assistant
</h1>

<span id="status">Idle</span>

</header>


<section class="speech">

<h3>
<i class="fa-solid fa-wave-square"></i>
You Said
</h3>

<p id="speechText">
Waiting for speech...
</p>

</section>


<section class="controls">

<button id="startBtn">

<i class="fa-solid fa-microphone"></i>
Start Listening

</button>


<button id="talkBackBtn">

<i class="fa-solid fa-comment-dots"></i>
Talk Back

</button>


<button id="cancelBtn">

<i class="fa-solid fa-stop"></i>
Stop

</button>

</section>


<section class="conversation">

<h3>
<i class="fa-solid fa-comments"></i>
Conversation
</h3>

<div id="chatLog"></div>

</section>

</div>


<select id="voiceSelect" style="display:none;"></select>

<script src="voice.js"></script>

</body>
</html>
